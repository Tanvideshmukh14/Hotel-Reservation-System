<!DOCTYPE html>
<html>
<head>
  <title>Dining Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="booking-page">

<h1 class="section-title">Reserve Your Dining Experience</h1>
  <div class="nav-links" id="navLinks">
     <a href="dining.html">Back to Dining</a>

   <span id="authSection"></span>
  </div>
<div class="card">

  <!-- Dining Details -->
  <img id="diningImg">
  <h2 id="diningName"></h2>
  <p id="diningPrice"></p>

  <!-- Booking Form -->
  <form id="bookingForm">
    <input type="text" id="name" placeholder="Your Name" required>

    <input type="email" id="email" placeholder="Your Email" required>

    <input type="date" id="date" required>

    <!-- NEW: Time Slot -->
    <input type="time" id="time" required>

    <!-- NEW: Number of Guests -->
    <input type="number" id="guests" placeholder="No. of Guests" min="1" required>

    <!-- Hidden values -->
    <input type="hidden" id="diningType">
    <input type="hidden" id="price">

    <button type="submit">Confirm Reservation</button>
  </form>

</div>

<script>
    <!-- NAVBAR TOGGLE -->
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
/* LOAD DINING DATA */
const diningName = localStorage.getItem("diningName");
const diningImage = localStorage.getItem("diningImage");
const diningPrice = localStorage.getItem("diningPrice");

document.getElementById("diningName").innerText = diningName;
document.getElementById("diningImg").src = diningImage;
document.getElementById("diningPrice").innerText = "Price: ₹" + diningPrice + " per person";

document.getElementById("diningType").value = diningName;
document.getElementById("price").value = diningPrice;

/* FORM SUBMIT */
document.getElementById("bookingForm").addEventListener("submit", async function(e){

    e.preventDefault();

 const booking = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,

    userId: parseInt(localStorage.getItem("userId")),

    serviceType: "DINING",  // ✅ IMPORTANT
    itemName: document.getElementById("diningType").value, // ✅ rename

    price: parseFloat(document.getElementById("price").value),

    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    guests: parseInt(document.getElementById("guests").value)
};
    try {
        const res = await fetch("http://localhost:8080/api/bookings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(booking)
        });

        if (!res.ok) throw new Error("Server error");

        await res.json();

        alert("🍽️ Dining Reservation Confirmed!");
        document.getElementById("bookingForm").reset();

    } catch (error) {
        alert("❌ Backend not running!");
        console.error(error);
    }

});
</script>

</body>
</html>
