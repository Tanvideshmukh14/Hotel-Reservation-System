<!DOCTYPE html>
<html>
<head>
  <title>Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="booking-page">

<h1 class="section-title">Book Your Room</h1>

<div class="card">

  <!-- Room Details -->
  <img id="roomImg">
  <h2 id="roomName"></h2>
  <p id="roomPrice"></p>

  <!-- Booking Form -->
  <form id="bookingForm">
    <input type="text" id="name" placeholder="Your Name" required>

    <input type="email" id="email" placeholder="Your Email" required>

    <input type="date" id="checkIn" required>

    <input type="date" id="checkOut" required>

    <!-- Hidden values -->
    <input type="hidden" id="roomType">
    <input type="hidden" id="price">

    <button type="submit">Confirm Booking</button>
  </form>
   <hr>
<br>
<h2>AI Room Recommendations</h2>

<div style="margin-top:20px;">
  <input type="number" id="budget" placeholder="Enter Budget (₹)">
  <input type="number" id="rating" placeholder="Minimum Rating (1-5)">
  
  <button onclick="getRecommendations()">Get Recommendations</button>
</div>

<div id="recommendations" style="margin-top:20px;"></div>
</div>


<script>
/* LOAD ROOM DATA */
const roomName = localStorage.getItem("roomName");
const roomImage = localStorage.getItem("roomImage");
const roomPrice = localStorage.getItem("roomPrice");

document.getElementById("roomName").innerText = roomName;
document.getElementById("roomImg").src = roomImage;
document.getElementById("roomPrice").innerText = "Price: ₹" + roomPrice + " / night";

document.getElementById("roomType").value = roomName;
document.getElementById("price").value = roomPrice;

/* FORM SUBMIT */
document.getElementById("bookingForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const booking = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        roomType: document.getElementById("roomType").value,
        price: parseFloat(document.getElementById("price").value),
        checkIn: document.getElementById("checkIn").value,
        checkOut: document.getElementById("checkOut").value
    };

    try {
        const res = await fetch("http://localhost:8080/api/bookings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(booking)
        });

        if (!res.ok) throw new Error("Server error");

        await res.json();

        alert("✅ Booking Confirmed!");
        document.getElementById("bookingForm").reset();

    } catch (error) {
        alert("❌ Backend not running!");
    }

});

async function getRecommendations(){

    const budget = document.getElementById("budget").value;
    const rating = document.getElementById("rating").value;

    if(!budget || !rating){
        alert("Please enter budget and rating!");
        return;
    }

    try {
        const res = await fetch("http://localhost:8080/api/ai/recommend", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                budget: parseFloat(budget),
                rating: parseFloat(rating)
            })
        });

        const data = await res.json();

        let html = "<h3>Recommended Rooms:</h3>";

        data.forEach(room => {
            html += `
                <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                    <h4>${room.type}</h4>
                    <p>Price: ₹${room.price}</p>
                    <p>Rating: ${room.rating}</p>
                </div>
            `;
        });

        document.getElementById("recommendations").innerHTML = html;

    } catch (error) {
        alert("❌ AI service not running!");
        console.error(error);
    }
}
</script>
</body>
</html>
