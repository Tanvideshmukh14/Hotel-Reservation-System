<!DOCTYPE html>
<html>
<head>

</head>
<body>

  <div class="navbar">
  <h2 class="logo">Hotel</h2>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">

    <a href="spa.html">Spa</a>
   
  </div>
</div>

<h1 class="section-title">Our Rooms</h1>

<div class="room-container">

  <div class="card">
  <img src="assets/room1.jpg">
  <h3>Deluxe Room</h3>

</div>

  <img src="assets/room2.jpg">
  <h3>Junior Suite</h3>
  <p>₹2000 / night</p>

  <button onclick="bookRoom('Junior Suite', 'assets/room2.jpg', 2000)">
    Book Now
  </button>
</div>

<div class="card">
  <img src="assets/room3.jpg">
  <h3>Executive Suite</h3>
  <p>₹4000 / night</p>

  <button onclick="bookRoom('Executive Suite', 'assets/room3.jpg', 4000)">

  </button>

 <div class="card">
  <img src="assets/room4.jpg">

<div class="card">

 <div class="card">

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
</script>


<script>
function bookRoom(name, image, price) {
  // store data
  localStorage.setItem("roomName", name);
  localStorage.setItem("roomImage", image);
  localStorage.setItem("roomPrice", price);

  // redirect
  window.location.href = "booking.html";
}
</script>

</body>
</html>
