<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<div class="navbar">
  <h2 class="logo">Hotel</h2>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="rooms.html">Rooms</a>
    <a href="dining.html">Dining</a>
    <a href="spa.html">Spa</a>
  
  </div>
</div>
<div id="rooms" class="room-container"></div>
 
<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
</script>


<script>
function bookRoom(name, image, price) {
  // store data
  localStorage.setItem("roomName", name);
  localStorage.setItem("roomImage", image);
  localStorage.setItem("roomPrice", price);

  // redirect
  window.location.href = "booking.html";
}
async function loadRooms() {
    const res = await fetch("http://localhost:8080/api/rooms");
    const data = await res.json();

    let html = "";

    data.forEach(room => {
        html += `
        <div class="card">
            <img src="${room.imageUrl}">
            <h3>${room.type}</h3>
            <p>₹${room.price}</p>
            <p>⭐ ${room.rating}</p>

            <button onclick="bookRoom('${room.type}', '${room.imageUrl}', ${room.price})">
                Book Now
            </button>
        </div>`;
    });

    document.getElementById("rooms").innerHTML = html;
}

loadRooms();

</script>

</body>
</html>
