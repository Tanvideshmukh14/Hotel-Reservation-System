<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dining</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2 class="logo">Hotel</h2>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="rooms.html">Rooms</a>
    <a href="dining.html">Dining</a>
    <a href="spa.html">Spa</a>
    <div id="authSection"></div>
  </div>
</div>

<h1 style="text-align:center;">Premium Dining</h1>

<div id="dining" class="room-container"></div>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
async function loadDining() {
    const res = await fetch("http://localhost:8080/api/dining");
    const data = await res.json();

    let html = "";

    data.forEach(dining => {
        html += `
        <div class="card">
            <img src="${dining.imageUrl}">
            <h3>${dining.type}</h3>
            <p>₹${dining.price}</p>
            <p>⭐ ${dining.rating}</p>

            <button onclick="bookDining('${dining.type}', '${dining.imageUrl}', ${dining.price})">
                Book Now
            </button>
        </div>`;
    });

    document.getElementById("dining").innerHTML = html;
}
function bookDining(name, image, price) {

    const userId = localStorage.getItem("userId");

    // ❌ Not logged in
    if (!userId) {
        alert("⚠️ Please login to book!");
        window.location.href = "login.html";
        return;
    }

    // ✅ Logged in → proceed
    localStorage.setItem("diningName", name);
    localStorage.setItem("diningImage", image);
    localStorage.setItem("diningPrice", price);

    window.location.href = "DiningBooking.html";
}
function renderAuth() {
    const userId = localStorage.getItem("userId");
    const userName = localStorage.getItem("userName");

    const authDiv = document.getElementById("authSection");

    if (!authDiv) return; // safety

    if (userId) {
        authDiv.innerHTML = `
            
             <a href="myBookings.html">My Bookings</a>
             <br>
             <br>
             <a onClick = "logout()">Logout</a>
        `;
    } else {
        authDiv.innerHTML = `
            <a onclick="goToLogin()">Login</a>
        `;
    }
}

function goToLogin() {
    window.location.href = "login.html";
}

function goToMyBookings() {
    window.location.href = "myBookings.html";
}

function logout() {
    localStorage.clear();
    alert("Logged out successfully!");
    window.location.href = "index.html";
}

// 🔥 run when page loads
document.addEventListener("DOMContentLoaded", renderAuth);
loadDining();
</script>

</body>
</html>
