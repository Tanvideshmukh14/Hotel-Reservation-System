<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dining</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2 class="logo">Hotel</h2>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="rooms.html">Rooms</a>
    <a href="dining.html">Dining</a>
    <a href="spa.html">Spa</a>
    
  </div>
</div>

<h1 style="text-align:center;">Premium Dining</h1>

<div id="dining" class="room-container"></div>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
async function loadDining() {
    const res = await fetch("http://localhost:8080/api/dining");
    const data = await res.json();

    let html = "";

    data.forEach(dining => {
        html += `
        <div class="card">
            <img src="${dining.imageUrl}">
            <h3>${dining.type}</h3>
            <p>₹${dining.price}</p>
            <p>⭐ ${dining.rating}</p>

            <button onclick="bookDining('${dining.type}', '${dining.imageUrl}', ${dining.price})">
                Book Now
            </button>
        </div>`;
    });

    document.getElementById("dining").innerHTML = html;
}

loadDining();
</script>

</body>
</html>
