<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2 class="logo">Hotel</h2>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="rooms.html">Rooms</a>
    <a href="dining.html">Dining</a>
    <a href="spa.html">Spa</a>
   
  </div>
</div>
<div id="spa" class="room-container"></div>


<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}


async function loadSpa() {
    const res = await fetch("http://localhost:8080/api/spa");
    const data = await res.json();

    let html = "";

    data.forEach(spa => {
        html += `
        <div class="card">
            <img src="${spa.imageUrl}">
            <h3>${spa.type}</h3>
            <p>₹${spa.price}</p>
            <p>⭐ ${spa.rating}</p>

            <button onclick="bookSpa('${spa.type}', '${spa.imageUrl}', ${spa.price})">
                Book Now
            </button>
        </div>`;
    });

    document.getElementById("spa").innerHTML = html;
}

loadSpa();

</script>

</body>
</html>
