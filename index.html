<script>
const input = document.getElementById("userInput");
const chatBody = document.getElementById("chat-body");

input.addEventListener("keypress", async function(e) {
  if (e.key === "Enter") {
    let userText = input.value;

    chatBody.innerHTML += `<p>You: ${userText}</p>`;

    try {
      let response = await fetch("http://localhost:3000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userText })
      });

      let data = await response.json();
      chatBody.innerHTML += `<p>Bot: ${data.reply}</p>`;
    } catch (error) {
      chatBody.innerHTML += `<p>Bot: Server not running ❌</p>`;
    }

    input.value = "";
  }
});
</script>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
function renderAuth() {
    const userId = localStorage.getItem("userId");
    const userName = localStorage.getItem("userName");

    const authDiv = document.getElementById("authSection");

    if (!authDiv) return; // safety

    if (userId) {
        authDiv.innerHTML = `
            <span style="margin-right:10px;">Hi, ${userName}</span>
           <a href="myBookings.html">My Bookings</a>
             <br>
             <br>
             <a onClick = "logout()">Logout</a>
        `;
    } else {
        authDiv.innerHTML = `
          <a onclick="goToLogin()">Login</a>

        `;
    }
}

function goToLogin() {
    window.location.href = "login.html";
}

function goToMyBookings() {
    window.location.href = "myBookings.html";
}

function logout() {
    localStorage.clear();
    alert("Logged out successfully!");
    window.location.href = "index.html";
}

// 🔥 run when page loads
document.addEventListener("DOMContentLoaded", renderAuth);
</script>
